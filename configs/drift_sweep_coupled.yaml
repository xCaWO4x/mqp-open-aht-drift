# Drift sweep with COUPLED food mode (capability-confound ablation).
#
# Identical grid to drift_sweep.yaml but food levels are coupled to agent
# composition, so food difficulty scales with team capability. This isolates
# the pure effect of compositional non-stationarity from changes in effective
# task difficulty.
#
# Designed for checkpoint: results/gpl_lbf_train_01_paper_full/checkpoints/gpl_final.pt
# Compare results against drift_sweep.yaml (fixed food) to quantify the
# capability confound.

sweep:
  sigmas: [0.0, 0.01, 0.05, 0.1, 0.2, 0.5]
  thetas: [0.05, 0.15, 0.3, 0.5, 1.0]

eval:
  n_episodes: 100
  n_seeds: 5
  stability_threshold: 0.10
  primary_metric: "iqm_return"
  seed: 42
