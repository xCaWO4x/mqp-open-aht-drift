# BOUNDARY PRESET: mild — cap sigma at 0.15; probe where degradation starts in low-noise regime.
# Compare collapse vs stress_sigma / reference sweeps.

sweep:
  sigmas: [0.0, 0.02, 0.05, 0.08, 0.12, 0.15]
  thetas: [0.05, 0.15, 0.3, 0.5, 1.0]

eval:
  n_episodes: 100
  n_seeds: 5
  stability_threshold: 0.10
  primary_metric: "iqm_return"
  seed: 42
