# Q3-inf — Info-nerf-only GPL + auxiliary inference head + EMA belief tracker
#
# Same task structure as Q1 / Q3_rw: 3 agents, no forced coop, but with
# information nerfs only (sight=3, observe_agent_levels=false).
# Adds:
#
#   1. Auxiliary level prediction head: cross-entropy on privileged teammate
#      level labels during training (CTDE). Forces type embeddings to encode
#      meaningful teammate structure despite observe_agent_levels=false.
#
#   2. EMA belief tracker: running average of type embeddings across episodes,
#      concatenated to observation input. Provides population-level context
#      so the policy can detect composition trends.
#
# Compare Q3-inf vs Q3_rw to measure how much auxiliary inference recovers.

# --- Environment (same as Q3_rw / Q1 structure + info nerfs) ---
env:
  id: "Foraging-8x8-3p-3f-v3"
  backend: "gymnasium"
  grid_size: 8
  n_agents: 3
  n_food: 3
  max_steps: 50
  force_coop: false
  sight: 3
  observe_agent_levels: false

# --- Agent types ---
types:
  K: 3
  levels: [1, 2, 3]
  level_offset: 1

# --- OU drift process ---
ou:
  K: 3
  dt: 0.01
  mu: null

# --- Food configuration ---
food:
  mode: "fixed"
  n_food: 3
  fixed_level_probs:
    2: 0.6
    3: 0.4
  coupled_concentration: 0.7

# --- PREPROCESS dimensions ---
# Same as Q3: observe_agent_levels=false → agent features are (y, x) = 2
# B_j = [x_j; u] = 2 + 3*3 = 11
preprocess:
  agent_feat_dim: 2
  food_feat_dim: 3
  obs_dim: 11

# --- GPL architecture ---
# Same model dimensions as Q3. The effective obs_dim seen by GPLAgentInf
# is obs_dim + ema_dim = 11 + 16 = 27 (handled internally by GPLAgentInf).
model:
  action_dim: 6
  hidden_dim: 100
  type_dim: 100
  n_gnn_layers: 2
  pairwise_rank: 5

# --- Inference module config (Q3-inf specific) ---
inference:
  ema_dim: 16                         # EMA context vector size
  ema_alpha: 0.1                      # EMA decay (higher = more recent)
  aux_weight: 0.1                     # auxiliary loss weight relative to RL
  aux_n_classes: 3                    # teammate level classes (= K)

# --- Training ---
training:
  mode: "online"
  n_episodes: 128000
  n_envs: 16
  lr: 2.5e-4
  gamma: 0.99
  t_update: 4
  t_targ_update: 1
  polyak_tau: 1.0e-3
  grad_clip: 10.0

# --- Epsilon schedule ---
epsilon:
  init: 1.0
  final: 0.05
  decay_steps: 4800000
  decay_episodes: 1500

# --- GPL variant ---
variant: "GPL-Q"
tau: null

spi:
  init_temp: 1.0
  final_temp: 0.01
  anneal_method: "linear"
  anneal_episodes: 1500

# --- Evaluation ---
eval:
  eval_every: 50
  eval_episodes: 5
  save_every: 50

# --- Drift evaluation ---
drift_eval:
  n_episodes: 50
  n_seeds: 5
  stability_threshold: 0.10
  primary_metric: "iqm_return"

# --- Logging ---
logging:
  wandb_project: "open-aht-drift"
  wandb_group: "q3-inf-rw"
  tensorboard: true
  log_dir: "runs/q3_inf_rw_stationary"
  results_dir: "results/q3_inf_rw_stationary"

# --- Reproducibility ---
seed: 42
