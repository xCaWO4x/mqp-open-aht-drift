# Drift evaluation sweep grid
# Used by Q2 (baseline + drift) and Q4_rw (rw baseline + drift).
# The training config (--config) determines env/model; this file only sets the grid.
#
# sigma=0 row is the stationary baseline (no noise → composition stays uniform).

sweep:
  sigmas: [0.0, 0.01, 0.05, 0.1, 0.2, 0.5, 1.0, 1.5, 2.0, 3.0]
  thetas: [0.05, 0.15, 0.3, 0.5, 1.0]

eval:
  n_episodes: 100
  n_seeds: 5
  stability_threshold: 0.10
  primary_metric: "iqm_return"
  seed: 42
