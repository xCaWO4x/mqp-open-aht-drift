# Drift degradation sweep configuration
# Grid of (sigma, theta) OU parameters to evaluate GPL robustness.
# Canonical grid for eval_drift.py with --sweep-config configs/drift_sweep.yaml.
# Boundary sweeps: configs/drift_sweep_bounds_*.yaml + eval_drift_sweep_bounds_array.slurm
#
# Default checkpoint: results/training_lbf_gpl_paper_128k/checkpoints/gpl_final.pt
# Baseline reference: sigma=0 row (stationary uniform composition, no drift).
#
# Note: env/model/food settings come from the TRAINING config (--config flag
# in eval_drift.py). This file only specifies the sweep grid and eval settings.

sweep:
  # sigma=0 row is the stationary baseline (no noise → composition stays uniform).
  # Remaining rows probe increasing volatility at each mean-reversion speed.
  sigmas: [0.0, 0.01, 0.05, 0.1, 0.2, 0.5]
  thetas: [0.05, 0.15, 0.3, 0.5, 1.0]

eval:
  n_episodes: 100     # episodes per (sigma, theta) grid point
  n_seeds: 5          # seeds for bootstrap CIs
  stability_threshold: 0.10   # 10% IQM drop = "degraded"
  primary_metric: "iqm_return"
  seed: 42
