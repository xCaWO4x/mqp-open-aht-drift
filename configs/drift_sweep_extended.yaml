# Extended OU diffusion sweep (fixed food) — for probing failure at higher σ.
#
# Comparison: canonical grid lives in drift_sweep.yaml → results/eval_drift_sweep_main/
# This file adds a high-diffusion tail while keeping all canonical σ values so cells
# overlap for direct comparison.
#
# OU update per episode (see drift/ou_process.py):
#   x ← x + θ(μ−x)·dt + σ·√dt·ξ,  then project to simplex.
# With default dt=0.01 from configs/gpl_lbf.yaml, innovation scale is σ·√dt ≈ 0.1·σ.
#
# Optional per-sweep OU overrides (merged into training config for eval only):
#   ou:
#     dt: 0.1
#
# Slurm: scripts/slurm/drift_eval_sweep_extended.slurm
# Results: results/eval_drift_sweep_main_extended/

sweep:
  sigmas: [0.0, 0.01, 0.05, 0.1, 0.2, 0.5, 1.0, 1.5, 2.0, 3.0]
  thetas: [0.05, 0.15, 0.3, 0.5, 1.0]

eval:
  n_episodes: 100
  n_seeds: 5
  stability_threshold: 0.10
  primary_metric: "iqm_return"
  seed: 42
