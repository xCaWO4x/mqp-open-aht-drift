# BOUNDARY PRESET: stress_sigma — extend sigma to 1.5 to force return / stability collapse at high OU noise.

sweep:
  sigmas: [0.0, 0.05, 0.1, 0.2, 0.5, 0.8, 1.2, 1.5]
  thetas: [0.05, 0.15, 0.3, 0.5, 1.0]

eval:
  n_episodes: 100
  n_seeds: 5
  stability_threshold: 0.10
  primary_metric: "iqm_return"
  seed: 42
