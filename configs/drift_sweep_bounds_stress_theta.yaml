# BOUNDARY PRESET: stress_theta — very slow vs very fast mean reversion (collapse when theta extreme).

sweep:
  sigmas: [0.0, 0.01, 0.05, 0.1, 0.2, 0.5]
  thetas: [0.01, 0.03, 0.1, 0.5, 1.0, 2.0]

eval:
  n_episodes: 100
  n_seeds: 5
  stability_threshold: 0.10
  primary_metric: "iqm_return"
  seed: 42
