# Q3_rw — Information-nerf-only GPL training for Level-Based Foraging
#
# Keep Q1 task structure (3 agents, no forced cooperation), but apply only
# the information nerfs:
#   1) sight: 8 -> 3
#   2) observe_agent_levels: true -> false
#
# This isolates observability/latent-type difficulty from task-structure
# changes like 4-agent coordination and forced coop.

# --- Environment ---
env:
  id: "Foraging-8x8-3p-3f-v3"
  backend: "gymnasium"
  grid_size: 8
  n_agents: 3
  n_food: 3
  max_steps: 50
  force_coop: false
  sight: 3
  observe_agent_levels: false

# --- Agent types (= LBF levels) ---
types:
  K: 3
  levels: [1, 2, 3]
  level_offset: 1

# --- OU drift process ---
ou:
  K: 3
  dt: 0.01
  mu: null

# --- Food configuration ---
food:
  mode: "fixed"
  n_food: 3
  fixed_level_probs:
    2: 0.6
    3: 0.4
  coupled_concentration: 0.7

# --- PREPROCESS dimensions ---
# With observe_agent_levels: false:
#   x_j = (y, x) = 2 features per agent
#   u   = (y, x, level) * n_food = 9 features
#   B_j = [x_j ; u] -> obs_dim = 11
preprocess:
  agent_feat_dim: 2
  food_feat_dim: 3
  obs_dim: 11

# --- GPL architecture ---
model:
  action_dim: 6
  hidden_dim: 100
  type_dim: 100
  n_gnn_layers: 2
  pairwise_rank: 5

# --- Training ---
training:
  mode: "online"
  n_episodes: 128000
  n_envs: 16
  lr: 2.5e-4
  gamma: 0.99
  t_update: 4
  t_targ_update: 1
  polyak_tau: 1.0e-3
  grad_clip: 10.0

# --- Epsilon schedule ---
epsilon:
  init: 1.0
  final: 0.05
  decay_steps: 4800000
  decay_episodes: 1500

# --- GPL variant ---
variant: "GPL-Q"
tau: null

spi:
  init_temp: 1.0
  final_temp: 0.01
  anneal_method: "linear"
  anneal_episodes: 1500

# --- Evaluation ---
eval:
  eval_every: 50
  eval_episodes: 5
  save_every: 50

# --- Drift evaluation ---
drift_eval:
  n_episodes: 50
  n_seeds: 5
  stability_threshold: 0.10
  primary_metric: "iqm_return"

# --- Logging ---
logging:
  wandb_project: "open-aht-drift"
  wandb_group: "q3-rw"
  tensorboard: true
  log_dir: "runs/q3_rw_stationary"
  results_dir: "results/q3_rw_stationary"

# --- Reproducibility ---
seed: 42
